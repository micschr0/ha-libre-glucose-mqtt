name: Release

# Builds and publishes a multi-arch container image for this app to
# GHCR, mirroring the upstream gluco-hub-rs release pipeline.
#
# Triggers and resulting tags (CalVer scheme, YYYY.MMDD.PATCH where
# MMDD = month*100 + day, e.g. 2026-05-15 → 515):
#   - push to main         → :main, :sha-<short>
#   - push to develop      → :develop, :sha-<short>   (when the branch exists)
#   - pre-release tag      → :X.Y.Z-rc.N, :testing, :sha-<short>
#   - final tag (v*, no -) → :X.Y.Z, :X.Y, :X, :latest, :stable, :sha-<short>
#   - pull_request         → build-only verification on both arches (no push)
#   - workflow_dispatch    → manual republish
#
# Architecture: two native-runner builds (amd64 on ubuntu-latest, arm64
# on ubuntu-24.04-arm) push by digest, then a merge job assembles the
# multi-arch manifest, signs it keyless with cosign, and attaches a
# SLSA build-provenance attestation. No QEMU emulation — the Dockerfile
# only copies the upstream gluco-hub binary, so the build is sub-30s.

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Don't cancel a release in flight if a newer commit lands — the
# in-flight build might be the one a user is about to pull. PRs are
# safe to cancel on rebase.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/libre-glucose

# Deny-all by default. Each job opts into the narrowest token scope it
# needs — `build` only `packages: write` for digest push, `merge` adds
# `id-token: write` for cosign keyless OIDC and `attestations: write`
# for the SLSA build-provenance attestation.
permissions: {}

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write       # push image layers by digest (no-op on PRs)
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute env
        run: |
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          # "linux/arm64" → "linux-arm64", used as artifact suffix
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
          # Parse "linux/amd64" → "amd64" for the HA add-on BUILD_ARCH label
          echo "BUILD_ARCH=${PLATFORM##*/}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only labels here — tags are computed in the merge job and
      # applied via `buildx imagetools create -t <tag> ...`. Per-arch
      # builds push by digest and have no human-readable tag of their
      # own.
      - name: Compute image labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.description=Home Assistant app bridging LibreLink Up to MQTT

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          # The Dockerfile and run.sh live under libre-glucose/.
          context: ./libre-glucose
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # HA-Supervisor passes these as build-args at install time;
          # we mirror that contract here so the published image carries
          # the same labels as a Supervisor-built one.
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ env.BUILD_ARCH }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_DESCRIPTION=Home Assistant app bridging LibreLink Up to MQTT
            BUILD_NAME=libre-glucose
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ github.ref_name }}
          # Per-platform cache scope so the two matrix jobs don't evict
          # each other.
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          # PRs build but don't push. Non-PR runs push by digest only —
          # the merge job assembles the multi-arch manifest with proper
          # tags.
          outputs: |
            ${{ github.event_name == 'pull_request'
              && 'type=cacheonly'
              || format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) }}
          # Provenance default for public repos is mode=max since
          # build-push-action v6 — leaving implicit. SBOM must be opted
          # into explicitly.
          sbom: true

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge & publish manifest
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push manifest list to GHCR
      id-token: write       # cosign keyless OIDC + attestation signing
      attestations: write   # GitHub Artifact Attestations
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Four-tier channel model, mirroring the upstream gluco-hub-rs:
      #   :develop                   — active integration branch (when present)
      #   :main                      — stable; main-only pushes
      #   :testing                   — pre-release tags (v*-rc/alpha/beta)
      #   :latest, :stable, floating — final tags only (v2026.515.0, no suffix)
      # `latest=false` disables auto-latest so :latest is set exclusively
      # by the explicit suffix-filtered raw rule below — no RC ever
      # moves :latest, :stable, :2026, or :2026.515.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        # `buildx imagetools create` operates on the manifest list / OCI
        # index and rejects the default `manifest:` annotation prefix.
        # Tell metadata-action to emit `index:`-prefixed annotations
        # instead.
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.description=Home Assistant app bridging LibreLink Up to MQTT
            org.opencontainers.image.licenses=AGPL-3.0-or-later
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=testing,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=sha,format=short

      - name: Create manifest list & push
        working-directory: /tmp/digests
        # Build the argv as a bash array so values containing spaces or
        # shell-meaningful chars (e.g. "->", "--flag=") cannot be
        # word-split into stray flags — closes a CWE-88 argument-
        # injection footgun.
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r tag; do
            args+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          while IFS= read -r ann; do
            args+=(--annotation "$ann")
          done < <(jq -r '.annotations[]? // empty' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          for digest in *; do
            args+=("${REGISTRY}/${IMAGE_NAME}@sha256:${digest}")
          done
          docker buildx imagetools create "${args[@]}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Resolve manifest digest
        id: manifest
        run: |
          digest=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign the manifest-list digest. One signature covers every tag
      # pointing at the same digest — re-tagging doesn't invalidate it.
      - name: Sign image (keyless)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign sign --yes \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "ref=${{ github.sha }}" \
            "${IMAGE}@${DIGEST}"

      # Pushes a Sigstore-signed SLSA provenance bundle to the registry,
      # discoverable in the GitHub UI and verifiable via:
      #   gh attestation verify oci://ghcr.io/<owner>/libre-glucose:<tag> \
      #     --owner <owner>
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  # Publish a GitHub Release for v* tags, with notes lifted from the
  # matching ## [X.Y.Z] section in libre-glucose/CHANGELOG.md. Runs only
  # after the manifest is signed & attested, so the Release page never
  # points at an unverified image. Pre-release tags (v*-rc.N / -alpha /
  # -beta) are flagged as pre-release and never move :latest.
  gh-release:
    name: publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the Release object + upload notes
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract changelog section
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip leading "v" → "2026.516.2", matches the CHANGELOG heading.
          version="${TAG#v}"
          # Pull lines between "## [<version>]" and the next "## [" heading.
          # `awk` keeps the body but drops the heading itself, so the
          # Release page shows the body only (the version is already the
          # Release title).
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag      { exit }
            flag                   { print }
          ' libre-glucose/CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            echo "::error::No CHANGELOG section found for $version" >&2
            exit 1
          fi
          echo "path=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.path }}
        run: |
          set -euo pipefail
          # Pre-release tags carry a hyphen (e.g. v2026.516.2-rc.1).
          if [[ "$TAG" == *-* ]]; then
            prerelease_flag=(--prerelease)
          else
            prerelease_flag=(--latest)
          fi
          # Idempotent: if a release already exists (manual backfill, or
          # workflow re-run), update its notes instead of failing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES" \
              "${prerelease_flag[@]}"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES" \
              --verify-tag \
              "${prerelease_flag[@]}"
          fi
