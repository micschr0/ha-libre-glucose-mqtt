name: Renovate


"on":
  schedule:
    # Daily at 03:00 UTC.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        required: false
        default: info
        type: choice
        options:
          - debug
          - info
          - warn

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

# Deny-all by default; the GitHub App token carries write permissions.
permissions: {}

jobs:
  renovate:
    name: Renovate self-hosted
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # Renovate contacts arbitrary package registries (npm, Docker
      # Hub, ghcr.io, crates.io, …) — a block list is not feasible, so
      # audit policy with a documented exception.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        id: app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          owner: "micschr0"
          repositories: "ha-libre-glucose-mqtt"
          permission-contents: write
          permission-pull_requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641  # v46.1.16
        with:
          configurationFile: renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          GIT_AUTHOR_NAME: micschro
          GIT_AUTHOR_EMAIL: micschr0@mailbox.org
          GIT_COMMITTER_NAME: micschro
          GIT_COMMITTER_EMAIL: micschr0@mailbox.org
          RENOVATE_ONBOARDING: "false"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
