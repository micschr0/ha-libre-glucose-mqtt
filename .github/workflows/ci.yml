---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deny-all by default; each job opts into the narrowest token scope it
# actually needs. Mirrors the hardening posture of the upstream
# gluco-hub-rs repository.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  addon-lint:
    name: Add-on linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      # Validates config.yaml against the HA add-on schema, checks
      # required files (icon.png / logo.png / DOCS.md / CHANGELOG.md
      # / translations / apparmor.txt when apparmor: true), warns on
      # deprecated keys.
      - uses: frenck/action-addon-linter@4d0965b4072596c4b2768a1d9eb6edd41d639a63 # v2.18.0
        with:
          path: ./libre-glucose/
          community: false

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47 # v1.5.0

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: libre-glucose/Dockerfile

  shellcheck:
    name: Shell lint (run.sh + tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # 2.0.0
        env:
          # run.sh is a bashio script (sourced /usr/bin/with-contenv
          # bashio), shellcheck should treat it as bash.
          # SC1091 = "Not following" — tests/test-run-sh.sh sources
          # tests/mock-bashio.sh dynamically; we don't need shellcheck
          # to follow that link for the lint pass.
          SHELLCHECK_OPTS: "-s bash -e SC1008 -e SC1091"
        with:
          scandir: "."
          ignore_paths: "translations .github"

  apparmor-syntax:
    name: AppArmor profile syntax
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - name: Install apparmor-parser
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apparmor apparmor-utils
      - name: Validate apparmor.txt (skip kernel load)
        run: |
          sudo apparmor_parser -Q -K \
            libre-glucose/apparmor.txt
          echo "apparmor.txt parses cleanly."

  docker-build:
    name: Docker build smoke (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build addon image (amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./libre-glucose
          platforms: linux/amd64
          push: false
          load: true
          tags: libre-glucose:ci
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
            GLUCO_HUB_TAG=develop
            BUILD_ARCH=amd64
            BUILD_DATE=ci
            BUILD_DESCRIPTION=ci-smoke
            BUILD_NAME=libre-glucose
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=ci
      - name: Inspect built image
        run: |
          docker image inspect libre-glucose:ci \
            --format 'OK: {{.RepoTags}} size={{.Size}}'

  env-mapping-smoke:
    name: run.sh ENV mapping + check-config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - name: Unit-test run.sh ENV mapping (mocked bashio)
        run: bash tests/test-run-sh.sh
      - name: Smoke-test gluco-hub check-config with the mocked env
        env:
          # `develop` channel: upstream gluco-hub-rs has not cut a CalVer
          # release yet, so :develop is the only published tag. Renovate
          # will switch us to a stable tag once one exists.
          GLUCO_HUB_TAG: "develop"
        run: bash tests/test-check-config.sh
