---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deny-all by default; each job opts into the narrowest token scope it
# actually needs. Mirrors the hardening posture of the upstream
# gluco-hub-rs repository.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  addon-lint:
    name: Add-on linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # Docker-based action (frenck/action-addon-linter) → audit policy.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Validates config.yaml against the HA add-on schema, checks
      # required files (icon.png / logo.png / DOCS.md / CHANGELOG.md
      # / translations / apparmor.txt when apparmor: true), warns on
      # deprecated keys.
      - uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./libre-glucose/
          community: false

  version-consistency:
    name: Version drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # Pure-shell grep job — no network beyond checkout, so egress is
      # blocked with an explicit endpoint allowlist.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Assert Dockerfile and build.yaml agree on upstream tag
        # Two places carry the upstream gluco-hub image tag: the
        # Dockerfile ARG and build.yaml's args.GLUCO_HUB_TAG. Both must
        # always match — Renovate's customManagers (see renovate.json)
        # bump them together. This check is the fail-safe in case one
        # path silently breaks (regex drift, manual edit, …).
        #
        # config.yaml's `version:` is NOT compared here. In steady state
        # (post-upstream-release) Renovate also bumps it to the same
        # CalVer string, so all three align. But during pre-release the
        # addon may carry a SemVer like "0.1.0-dev" while the image
        # ARG points at the `:develop` rolling channel — that's a
        # legitimate state, not drift.
        run: |
          set -euo pipefail
          DOCKERFILE_TAG=$(grep -oP 'ARG GLUCO_HUB_TAG=\K\S+' \
            libre-glucose/Dockerfile)
          BUILD_TAG=$(grep -oP 'GLUCO_HUB_TAG:\s*"?\K[^"\s]+' \
            libre-glucose/build.yaml)
          CONFIG_VERSION=$(grep -oP '^version:\s*"?\K[^"\s]+' \
            libre-glucose/config.yaml)
          echo "Dockerfile GLUCO_HUB_TAG : $DOCKERFILE_TAG"
          echo "build.yaml GLUCO_HUB_TAG : $BUILD_TAG"
          echo "config.yaml version:      $CONFIG_VERSION  (informational)"
          if [ "$DOCKERFILE_TAG" != "$BUILD_TAG" ]; then
            echo "::error::Dockerfile and build.yaml disagree on GLUCO_HUB_TAG"
            exit 1
          fi
          echo "OK: upstream-tag refs agree on $DOCKERFILE_TAG"
          # Port-drift guard: ingress_port in config.yaml must match the
          # bind port in run.sh (GLUCO_HUB__HTTP__BIND). Both hardcode 8080;
          # this check catches silent drift from manual edits or future
          # upstream port changes. Only enforced when ingress_port is set.
          INGRESS_PORT=$(grep -oP 'ingress_port:\s*\K\d+' \
            libre-glucose/config.yaml || echo "not-set")
          BIND_PORT=$(grep -oP 'GLUCO_HUB__HTTP__BIND=.*?:\K\d+' \
            libre-glucose/run.sh)
          echo "config.yaml ingress_port         : $INGRESS_PORT"
          echo "run.sh GLUCO_HUB__HTTP__BIND port: $BIND_PORT"
          if [ "$INGRESS_PORT" != "not-set" ] && \
             [ "$INGRESS_PORT" != "$BIND_PORT" ]; then
            echo "::error::ingress_port ($INGRESS_PORT) != bind port ($BIND_PORT)"
            exit 1
          fi
          echo "OK: ingress_port and bind port agree"

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # Docker-based action (frenck/action-yamllint) → audit policy.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47 # v1.5.0

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # hadolint-action v3 is a Docker action (image FROM
      # ghcr.io/hadolint/hadolint) → audit policy like every other
      # containerized linter in this workflow.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: libre-glucose/Dockerfile

  shellcheck:
    name: Shell lint (run.sh + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # Docker-based action (ludeeus/action-shellcheck) → audit policy.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          # run.sh is a bashio script (sourced /usr/bin/with-contenv
          # bashio), shellcheck should treat it as bash.
          # SC1091 = "Not following" — tests/test-run-sh.sh sources
          # tests/mock-bashio.sh dynamically; we don't need shellcheck
          # to follow that link for the lint pass.
          SHELLCHECK_OPTS: "-s bash -e SC1008 -e SC1091 -e SC2329"
        with:
          scandir: "."
          ignore_paths: "translations .github"

  apparmor-syntax:
    name: AppArmor profile syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # apt-get update fetches from http://azure.archive.ubuntu.com:80
      # plus third-party repos preconfigured on ubuntu-latest — a block
      # allowlist is not maintainable here → audit policy.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install apparmor-parser
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apparmor apparmor-utils
      - name: Validate apparmor.txt (skip kernel load)
        run: |
          sudo apparmor_parser -Q -K \
            libre-glucose/apparmor.txt
          echo "apparmor.txt parses cleanly."

  docker-build:
    name: Docker build smoke (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read        # pull base images from ghcr.io
    steps:
      # Docker build pulls base images from ghcr.io → audit policy
      # (registry egress is intrinsic to the job).
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build addon image (amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./libre-glucose
          platforms: linux/amd64
          push: false
          load: true
          tags: libre-glucose:ci
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:trixie-2026.06.1
            GLUCO_HUB_TAG=2026.621.0
            BUILD_ARCH=amd64
            BUILD_DATE=ci
            BUILD_DESCRIPTION=ci-smoke
            BUILD_NAME=libre-glucose
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=ci
      - name: Inspect built image
        run: |
          docker image inspect libre-glucose:ci \
            --format 'OK: {{.RepoTags}} size={{.Size}}'

  env-mapping-smoke:
    name: run.sh ENV mapping + check-config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read        # pull base images from ghcr.io
    steps:
      # Test scripts docker-pull the upstream gluco-hub image from
      # ghcr.io → audit policy.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Unit-test run.sh ENV mapping (mocked bashio)
        run: bash tests/test-run-sh.sh
      - name: Smoke-test gluco-hub check-config with the mocked env
        env:
          GLUCO_HUB_TAG: "2026.621.0"
        run: bash tests/test-check-config.sh
      - name: Unit-test multi-account TOML generation
        run: bash tests/test-run-sh-multi.sh

  zizmor:
    name: GitHub Actions security scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write  # upload zizmor SARIF to code scanning
      actions: read           # zizmor workflow metadata
    steps:
      # zizmor-action is Docker-based → audit policy (per hardening
      # convention for containerized scanners).
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          min-severity: medium
          min-confidence: medium
          # Skip API-dependent audits (impostor-commit et al.): the GH
          # API rate limit previously caused implicit-offline false
          # positives. Offline mode is deterministic.
          online-audits: false
