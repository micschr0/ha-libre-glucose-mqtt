---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deny-all by default; each job opts into the narrowest token scope it
# actually needs. Mirrors the hardening posture of the upstream
# gluco-hub-rs repository.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  addon-lint:
    name: Add-on linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      # Validates config.yaml against the HA add-on schema, checks
      # required files (icon.png / logo.png / DOCS.md / CHANGELOG.md
      # / translations / apparmor.txt when apparmor: true), warns on
      # deprecated keys.
      - uses: frenck/action-addon-linter@4cc99ea3df5d3acdbb8be7c41b1b2dfff8cbc89f # v2.18
        with:
          path: ./ha-libre-glucose-mqtt/
          community: false

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: frenck/action-yamllint@b9e3e64a92dc56cd915e21b09824b50ec00fbf80 # v1.5.0

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: ha-libre-glucose-mqtt/Dockerfile

  shellcheck:
    name: Shell lint (run.sh)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # 2.0.0
        env:
          # run.sh is a bashio script (sourced /usr/bin/with-contenv
          # bashio), shellcheck should treat it as bash.
          SHELLCHECK_OPTS: "-s bash -e SC1008"
        with:
          scandir: "./ha-libre-glucose-mqtt"
          ignore_paths: "translations"
