# Zizmor configuration. See https://docs.zizmor.sh/usage/#configuration
#
# Ignores are kept here (not as inline `# zizmor: ignore[...]` comments)
# so the `uses:` lines stay clean for Renovate's version-comment parser
# (helpers:pinGitHubActionDigestsToSemver in renovate.json).
#
# Ignore paths MUST be bare filenames (e.g. `ci.yml`) — directory-
# prefixed paths silently never match.
#
# No suppressions currently. The ci.yml zizmor job runs with
# `online-audits: false`, so API-dependent audits (impostor-commit,
# ref-version-mismatch online checks) are skipped deterministically —
# the former impostor-commit suppression for anchore/scan-action
# (false positive from GH API rate limiting) is no longer needed.
rules: {}
