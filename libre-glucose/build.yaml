# Per-arch base image. We use the Debian flavour because the upstream
# gluco-hub binary is built against glibc (see micschr0/gluco-hub-rs
# Dockerfile, distroless/cc-debian12 runtime). An Alpine base would
# require a musl rebuild of gluco-hub.
# Debian 13 (trixie) replaces the EOL bookworm base; glibc is forward-
# compatible so the upstream binary continues to run without rebuild.
# Pinned to the latest HA patch-tag; Renovate tracks new patch releases.
build_from:
  amd64: ghcr.io/home-assistant/amd64-base-debian:trixie-2026.06.1
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:trixie-2026.06.1

args:
  # Tag the upstream gluco-hub release pulled in by the Dockerfile.
  # Renovate's customManagers (see renovate.json) keep this in lockstep
  # with the Dockerfile ARG and config.yaml `version:`.
  GLUCO_HUB_TAG: "2026.621.0"
