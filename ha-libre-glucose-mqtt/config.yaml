# Home Assistant Supervisor add-on manifest.
# Schema reference: https://developers.home-assistant.io/docs/add-ons/configuration
#
# This add-on is a thin wrapper around the upstream gluco-hub-rs container
# image (https://github.com/micschr0/gluco-hub-rs). All polling, MQTT, and
# discovery logic lives upstream; this file only translates HA add-on
# options + the Mosquitto service hand-off into GLUCO_HUB__* env vars that
# the Rust binary already understands.

name: Libre Glucose MQTT Bridge
slug: ha-libre-glucose-mqtt
version: "2026.514.0"
description: >-
  Polls LibreLink Up glucose readings and publishes them to MQTT with
  Home Assistant auto-discovery. Powered by gluco-hub-rs.
url: https://github.com/micschr0/ha-libre-glucose-mqtt
stage: stable

# Minimum Home Assistant Core version. 2024.1 ships the addon_config map
# type and the modern bashio::services API used by run.sh.
homeassistant: "2024.1.0"

# gluco-hub-rs ships multi-arch manifests for linux/amd64 + linux/arm64
# (see micschr0/gluco-hub-rs/.github/workflows/release.yml). 32-bit ARM
# is intentionally out of scope until upstream builds an armv7 target.
arch:
  - amd64
  - aarch64

# Custom AppArmor profile — see apparmor.txt next to this file. `true`
# tells the Supervisor to load `apparmor.txt` under the slug name; the
# explicit profile drops capabilities and confines filesystem writes to
# /data, which earns +1 on the Supervisor security rating.
apparmor: true

# `init: false` tells s6-overlay to exec our run.sh directly. gluco-hub
# is a long-running, well-behaved process and handles SIGTERM itself.
init: false

# Start with Home Assistant's other long-running services, after USB
# probes but before user automations.
startup: services
boot: auto

# Liveness probe for the Supervisor watchdog: gluco-hub's HTTP API
# binds to 0.0.0.0:8080 inside the container (no host-side port
# exposure — we don't declare `ports:`), so the Supervisor restarts
# the add-on automatically if the TCP socket stops accepting.
watchdog: "tcp://[HOST]:[PORT:8080]"

# Hard dependency on the MQTT service (Mosquitto add-on). HA Supervisor
# refuses to start this add-on when no MQTT service is registered, and
# `bashio::services 'mqtt' '*'` returns credentials automatically.
services:
  - mqtt:need

# /data is persisted across add-on updates by the Supervisor. The DLQ
# writes batches here so unflushed readings survive restarts.
map:
  - data:rw

# No ingress, no host network, no devices, no privileged caps — the
# add-on talks outbound to LibreLink Up over HTTPS and to the
# in-cluster MQTT broker only. No `image:` either: a tiny Dockerfile
# next to this file copies the gluco-hub binary onto a HA Debian base
# (s6 + bashio), built on the Supervisor at install time.

options:
  llu_email: ""
  llu_password: ""
  llu_region: "EU"
  llu_patient_id: ""
  llu_timezone: "UTC"
  poll_interval_secs: 60
  device_name: ""
  topic_prefix: "gluco-hub/ha"
  client_id: "gluco-hub-ha"
  log_level: "info"

schema:
  llu_email: email
  llu_password: password
  llu_region: "list(AE|AP|AU|CA|DE|EU|EU2|FR|JP|US|LA|RU|CN)"
  llu_patient_id: "str?"
  llu_timezone: "str"
  poll_interval_secs: "int(30,600)"
  device_name: "str?"
  topic_prefix: "str"
  client_id: "match(^[A-Za-z0-9_-]{1,23}$)"
  log_level: "list(trace|debug|info|warn|error)"
