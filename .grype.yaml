# Ignore rules for the Grype container CVE scan.
#
# Every entry MUST justify why we accept the risk and carry a review
# date (~90 days). Renovate bumps the cosign-verified Home Assistant
# base image when upstream rebuilds; revisit then and prune.
#
# Last reviewed: 2026-06-06 — review by: 2026-08-25

fail-on-severity: critical

ignore:
  # Go stdlib and stdlib-adjacent vulnerabilities baked into /usr/bin/tempio
  # (HA's templating helper, statically linked against go1.23.3 with
  # golang.org/x/crypto v0.26.0). Fixed only by an HA base image rebuild
  # against a newer Go toolchain. Same exceptions as ha-reverse-autossh-tunnel.
  - vulnerability: CVE-2025-22871
    package:
      name: stdlib
      type: go-module
  - vulnerability: CVE-2025-68121
    package:
      name: stdlib
      type: go-module
  - vulnerability: CVE-2026-27143
    package:
      name: stdlib
      type: go-module
  - vulnerability: GHSA-v778-237x-gjrc
    package:
      name: golang.org/x/crypto
      type: go-module
  # 2026-06-06: Grype's DB now additionally flags these stdlib + x/crypto
  # advisories in the SAME /usr/bin/tempio binary as critical (CVSS up to 10),
  # which trips fail-on-severity. Same root cause and acceptance rationale as
  # the entries above: tempio is the HA base image's config-template renderer
  # (statically linked go1.23.3 + golang.org/x/crypto v0.26.0), is not built
  # by this add-on, runs once at container start with no network service (so
  # the TLS/SSH network-path CVEs are unreachable here), and is fixable only
  # by an upstream HA base image rebuild on a newer Go toolchain. — review
  # by: 2026-08-25
  - vulnerability: GO-2025-3563
    package:
      name: stdlib
      type: go-module
  - vulnerability: GO-2026-4337
    package:
      name: stdlib
      type: go-module
  - vulnerability: GO-2024-3321
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5005
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5006
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5017
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5019
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5020
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5021
    package:
      name: golang.org/x/crypto
      type: go-module
  - vulnerability: GO-2026-5023
    package:
      name: golang.org/x/crypto
      type: go-module

  # libc6 + libc-bin: glibc vulnerabilities in HA Debian base (bookworm).
  # Both packages ship the same glibc version (2.36-9+deb12u14); fix requires
  # HA upstream to rebuild base-debian once Debian backports the patches.
  - vulnerability: CVE-2026-5450
    package:
      name: libc6
      type: deb
    # scanf %mc heap-overflow in glibc 2.7–2.43. Rust binary never calls
    # C scanf with user input. — review by: 2026-08-25
  - vulnerability: CVE-2026-5450
    package:
      name: libc-bin
      type: deb
  - vulnerability: CVE-2019-1010022
    package:
      name: libc6
      type: deb
    # Stack-guard bypass, disputed upstream (working-as-designed, no fix
    # planned). Not exploitable without prior stack overflow. — review by: 2026-08-25
  - vulnerability: CVE-2019-1010022
    package:
      name: libc-bin
      type: deb

  # libssh2-1 1.10.0-3+b1 in HA Debian base (bookworm). CVE-2026-55200 is an
  # out-of-bounds write in ssh2_transport_read() when packet_length exceeds
  # buffer bounds — RCE via crafted SSH packets. The upstream fix exists
  # (libssh2 commit 97acf3df) but is not yet backported to any Debian suite
  # (bookworm, trixie, sid all show "unfixed"; Debian bug #1140401). The
  # add-on's Rust binary uses rustls for all TLS/SSH; libssh2 is an unused
  # transitive base-image dependency, never invoked. Fix requires an HA base
  # image rebuild once Debian ships the backport. — review by: 2026-09-21
  - vulnerability: CVE-2026-55200
    package:
      name: libssh2-1
      type: deb

  # libgnutls30 3.7.9-2+deb12u6 in HA Debian base (bookworm). Fix requires
  # HA upstream to rebuild base-debian once Debian ships a patched package.
  # The add-on's Rust binary uses rustls, not GnuTLS.
  - vulnerability: CVE-2026-33845
    package:
      name: libgnutls30
      type: deb
    # — review by: 2026-08-25
  - vulnerability: CVE-2026-42010
    package:
      name: libgnutls30
      type: deb
    # — review by: 2026-08-25

  # tar in HA Debian base (bookworm). CVE-2005-2541 is a disputed 2005 CVE
  # (tar extracting setuid/setgid files is documented, working-as-designed
  # behaviour, no fix planned upstream); Grype's DB recently re-rated it to
  # critical, which trips fail-on-severity. The add-on extracts no untrusted
  # tarballs, so this is not reachable. — review by: 2026-08-25
  - vulnerability: CVE-2005-2541
    package:
      name: tar
      type: deb

  # perl-base 5.36.0-7+deb12u3 in HA Debian base (bookworm). CVE-2026-8376
  # is a heap overflow in Perl_study_chunk when compiling a regex with a
  # repeated fixed string, but the SSize_t overflow only occurs on 32-bit
  # builds; the add-on image is amd64/arm64 (64-bit). perl-base is an
  # unused transitive base-image dependency — the Rust binary compiles no
  # Perl regexes, let alone attacker-controlled ones. Grype rates the match
  # low; only GitHub's mapping calls it critical. Fix requires an HA base
  # image rebuild once Debian ships a patched perl. — review by: 2026-08-25
  - vulnerability: CVE-2026-8376
    package:
      name: perl-base
      type: deb
  # CVE-2026-42496: Archive::Tar < 3.08 (bundled in perl-base) extracts
  # symlinks with attacker-controlled targets outside the extraction dir
  # (path traversal). Reachable only by extracting an untrusted tar archive
  # through Perl — the add-on's Rust binary runs no Perl and extracts no
  # untrusted tarballs. perl-base is an unused transitive base-image dep.
  # Not yet fixed in Debian bookworm; needs an HA base image rebuild once
  # Archive::Tar 3.08 is backported. — review by: 2026-08-25
  - vulnerability: CVE-2026-42496
    package:
      name: perl-base
      type: deb
  # CVE-2026-12087: out-of-bounds heap read (max 3 bytes) in the Perl Socket
  # module's pack_ip_mreq_source() (Socket.xs), reachable only when Perl code
  # packs a multicast source-group address with a too-short source argument.
  # perl-base bundles the vulnerable Socket.so, but the add-on runs no Perl —
  # only the Rust binary gluco-hub — so the code path is never invoked.
  # No patched perl-base exists in ANY Debian suite: bookworm, trixie and sid
  # all ship a vulnerable bundled Socket (perl source is "(unfixed)", bug
  # #1140152); only the standalone libsocket-perl 2.041 is fixed, which
  # perl-base does not use. NVD/OSV publish no CVSS and there is no GitHub
  # advisory — only Grype's DB rates this critical. Switching base is no fix
  # (trixie also vulnerable; HA ships no trixie base anyway). Needs an HA base
  # image rebuild once Debian backports the perl core fix. — review by: 2026-08-25
  - vulnerability: CVE-2026-12087
    package:
      name: perl-base
      type: deb
